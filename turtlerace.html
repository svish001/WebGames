<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Turtle Race — WebGames</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#090909;color:#f4f1eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:rgba(15,15,15,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:2rem;width:min(600px,100%);box-shadow:0 40px 100px rgba(0,0,0,0.6);display:flex;flex-direction:column;gap:1.25rem}
h1{font-size:1.8rem;font-weight:800;color:#c6a76a}
p.sub{color:#b5aea3;font-size:.9rem}
.screen{display:none;flex-direction:column;gap:1rem}
.screen.active{display:flex}
.bet-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}
.bet-btn{padding:.8rem;border-radius:12px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);cursor:pointer;font-family:inherit;font-size:1rem;font-weight:700;transition:.15s;display:flex;align-items:center;gap:.5rem}
.bet-btn:hover{transform:translateY(-1px)}
.bet-btn.selected{border-width:2px}
.track-container{display:flex;flex-direction:column;gap:.4rem}
.turtle-row{display:flex;align-items:center;gap:.75rem}
.turtle-label{font-size:1.2rem;width:28px;text-align:center}
.track{flex:1;background:rgba(255,255,255,0.06);border-radius:99px;height:22px;position:relative;overflow:hidden}
.turtle-prog{height:100%;border-radius:99px;transition:width .15s ease-out;display:flex;align-items:center;justify-content:flex-end;min-width:30px}
.turtle-icon{font-size:.9rem;margin-right:2px;display:inline-block}
.finish-flag{position:absolute;right:0;top:0;height:100%;width:4px;background:rgba(255,255,255,0.2);border-radius:0 99px 99px 0}
button{cursor:pointer;font-family:inherit;font-weight:700;border:none;border-radius:12px;padding:.875rem;font-size:.95rem;transition:transform .15s;width:100%}
button:hover:not(:disabled){transform:translateY(-1px)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,#c6a76a,#e8c87a);color:#111}
.btn-ghost{background:rgba(255,255,255,0.06);color:#f4f1eb;border:1px solid rgba(255,255,255,0.12)}
.result-banner{text-align:center;font-size:1.3rem;font-weight:800;padding:1rem;border-radius:14px}
.win{background:rgba(52,199,89,.12);border:1px solid rgba(52,199,89,.4);color:#34c759}
.lose{background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.35);color:#ff453a}
.back{display:block;text-align:center;color:#7f786f;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none}
.back:hover{color:#c6a76a}
</style></head><body>
<div class="card">
  <h1>🐢 Turtle Race</h1>
  <div class="screen active" id="betScreen">
    <p class="sub">Pick a turtle to cheer for, then watch the race!</p>
    <div class="bet-grid" id="betGrid"></div>
    <button class="btn-gold" id="startRaceBtn" onclick="startRace()" disabled>Start Race!</button>
  </div>
  <div class="screen" id="raceScreen">
    <div class="track-container" id="trackContainer"></div>
    <div class="result-banner" id="resultBanner" style="display:none"></div>
    <button class="btn-ghost" onclick="goSetup()">Race Again</button>
  </div>
  <a href="game_hub.html" class="back">← Back to Hub</a>
</div>
<script>
const TURTLES=[{name:'Red',emoji:'🔴',color:'#ff453a'},{name:'Blue',emoji:'🔵',color:'#0a84ff'},{name:'Green',emoji:'🟢',color:'#30d158'},{name:'Yellow',emoji:'🟡',color:'#ffd60a'},{name:'Purple',emoji:'🟣',color:'#bf5af2'},{name:'Orange',emoji:'🟠',color:'#ff9f0a'}];
let bet=null,positions=[],raceInterval=null;
function goSetup(){
  clearInterval(raceInterval);bet=null;
  document.getElementById('betScreen').classList.add('active');document.getElementById('betScreen').style.display='flex';
  document.getElementById('raceScreen').classList.remove('active');document.getElementById('raceScreen').style.display='none';
  document.getElementById('startRaceBtn').disabled=true;
  buildBetGrid();
}
function buildBetGrid(){
  const g=document.getElementById('betGrid');g.innerHTML='';
  TURTLES.forEach((t,i)=>{
    const b=document.createElement('button');b.className='bet-btn';b.innerHTML=`<span style="font-size:1.4rem">${t.emoji}</span><span style="color:${t.color}">${t.name}</span>`;
    b.onclick=()=>{bet=i;document.querySelectorAll('.bet-btn').forEach(x=>{x.classList.remove('selected');x.style.borderColor='rgba(255,255,255,0.12)'});b.classList.add('selected');b.style.borderColor=t.color;document.getElementById('startRaceBtn').disabled=false};
    g.appendChild(b);
  });
}
function startRace(){
  if(bet===null)return;
  positions=TURTLES.map(()=>0);
  document.getElementById('betScreen').classList.remove('active');document.getElementById('betScreen').style.display='none';
  document.getElementById('raceScreen').classList.add('active');document.getElementById('raceScreen').style.display='flex';
  document.getElementById('resultBanner').style.display='none';
  buildTracks();
  raceInterval=setInterval(tick,100);
}
function buildTracks(){
  const c=document.getElementById('trackContainer');c.innerHTML='';
  TURTLES.forEach((t,i)=>{
    const row=document.createElement('div');row.className='turtle-row';
    row.innerHTML=`<span class="turtle-label" title="${t.name}">${t.emoji}</span><div class="track"><div class="turtle-prog" id="prog${i}" style="width:3%;background:${t.color}"><span class="turtle-icon">🐢</span></div><div class="finish-flag"></div></div>`;
    c.appendChild(row);
  });
}
function tick(){
  let winner=-1;
  positions=positions.map((p,i)=>{
    const step=Math.random()*4+0.5;const np=Math.min(100,p+step);
    const bar=document.getElementById('prog'+i);if(bar)bar.style.width=np+'%';
    if(np>=100&&winner<0)winner=i;return np;
  });
  if(winner>=0){clearInterval(raceInterval);showResult(winner);}
}
function showResult(w){
  const t=TURTLES[w];const won=w===bet;
  const b=document.getElementById('resultBanner');
  b.className='result-banner '+(won?'win':'lose');
  b.textContent=won?`🏆 ${t.name} wins — and so do you! Great pick!`:`${t.emoji} ${t.name} wins! Better luck next time.`;
  b.style.display='block';
}
buildBetGrid();
</script>
</body></html>
