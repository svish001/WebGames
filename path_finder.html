<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Maze Runner — WebGames</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:radial-gradient(circle at 12% 10%,rgba(198,167,106,.18),transparent 26%),radial-gradient(circle at 88% 0%,rgba(255,255,255,.08),transparent 20%),linear-gradient(180deg,#050505 0%,#0c0c0c 100%);background-attachment:fixed;color:#f4f1eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;flex-direction:column;gap:.75rem}
.card{background:rgba(15,15,15,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:1.5rem;width:min(520px,100%);box-shadow:0 40px 100px rgba(0,0,0,0.6);display:flex;flex-direction:column;gap:1rem}
h1{font-size:1.6rem;font-weight:800;color:#c6a76a}
.hud{display:flex;justify-content:space-between;font-size:.8rem;color:#7f786f}
.hud strong{color:#c6a76a}
canvas{border-radius:12px;display:block;width:100%;image-rendering:pixelated}
.dpad{display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(2,56px);gap:6px;margin:0 auto}
.dpad button{width:56px;height:56px;border-radius:10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#f4f1eb;font-size:1.4rem;cursor:pointer;font-family:inherit;transition:.12s}
.dpad button:hover{background:rgba(198,167,106,.18)}
.dpad button:active{transform:scale(.93);background:rgba(198,167,106,.3)}
button.btn-gold{cursor:pointer;font-family:inherit;font-weight:700;border:none;border-radius:12px;padding:.8rem;font-size:.9rem;background:linear-gradient(135deg,#c6a76a,#e8c87a);color:#111;width:100%;transition:transform .15s}
button.btn-ghost{cursor:pointer;font-family:inherit;font-weight:700;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:.8rem;font-size:.9rem;background:rgba(255,255,255,0.06);color:#f4f1eb;width:100%;transition:transform .15s}
.btn-gold:hover,.btn-ghost:hover{transform:translateY(-1px)}
.screen{display:none;flex-direction:column;gap:1rem}
.screen.active{display:flex}
.back{display:block;text-align:center;color:#7f786f;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none}
.back:hover{color:#c6a76a}
select{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:10px;padding:.75rem 1rem;color:#f4f1eb;font-size:1rem;font-family:inherit;outline:none}
select:focus{border-color:#c6a76a}
select option{background:#111}
label{font-size:.8rem;color:#7f786f;text-transform:uppercase;letter-spacing:.1em}
</style></head><body>
<div class="card">
  <h1>🗺️ Maze Runner</h1>
  <div class="screen active" id="setupScreen">
    <p style="color:#b5aea3;font-size:.9rem">Navigate the maze from 🟡 Start to 🏁 Exit using arrow keys or the D-Pad below.</p>
    <div><label>Difficulty</label>
      <select id="sizeSelect" style="margin-top:.4rem">
        <option value="9">Easy (9×9)</option>
        <option value="13" selected>Medium (13×13)</option>
        <option value="19">Hard (19×19)</option>
      </select>
    </div>
    <button class="btn-gold" onclick="beginGame()">Start Maze!</button>
  </div>
  <div class="screen" id="gameScreen">
    <div class="hud"><span>Moves: <strong id="movesDisp">0</strong></span><span id="timerDisp">00:00</span></div>
    <canvas id="mazeCanvas"></canvas>
    <div class="dpad">
      <div></div><button onclick="move(0,-1)">▲</button><div></div>
      <button onclick="move(-1,0)">◄</button><button onclick="move(0,1)">▼</button><button onclick="move(1,0)">►</button>
    </div>
    <button class="btn-ghost" onclick="beginGame()">New Maze</button>
  </div>
  <div class="screen" id="winScreen">
    <div style="text-align:center;font-size:3rem">🏆</div>
    <div style="text-align:center"><strong style="font-size:1.3rem" id="winTitle">You escaped!</strong><br/><span style="color:#b5aea3" id="winSub"></span></div>
    <button class="btn-gold" onclick="beginGame()">Play Again</button>
    <button class="btn-ghost" onclick="show('setupScreen')">Change Difficulty</button>
  </div>
  <a href="game_hub.html" class="back">← Back to Hub</a>
</div>
<script>
const CELL=28;let N,grid,px,py,moves,timerInt,elapsed;
function show(id){['setupScreen','gameScreen','winScreen'].forEach(s=>{const e=document.getElementById(s);e.classList.remove('active');e.style.display='none'});const e=document.getElementById(id);e.classList.add('active');e.style.display='flex'}

function beginGame(){
  N=+document.getElementById('sizeSelect').value;
  grid=Array.from({length:N},()=>Array(N).fill(1));
  carveMaze(0,0);
  px=0;py=0;moves=0;elapsed=0;
  clearInterval(timerInt);
  timerInt=setInterval(()=>{elapsed++;const m=Math.floor(elapsed/60),s=elapsed%60;document.getElementById('timerDisp').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')},1000);
  updateMoves();
  show('gameScreen');
  drawMaze();
}
function carveMaze(x,y){
  grid[y][x]=0;
  const dirs=[[0,-2],[0,2],[-2,0],[2,0]].sort(()=>Math.random()-.5);
  for(const[dx,dy]of dirs){
    const nx=x+dx,ny=y+dy;
    if(nx>=0&&nx<N&&ny>=0&&ny<N&&grid[ny][nx]===1){
      grid[y+dy/2][x+dx/2]=0;
      carveMaze(nx,ny);
    }
  }
}
function drawMaze(){
  const canvas=document.getElementById('mazeCanvas');
  canvas.width=N*CELL;canvas.height=N*CELL;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    if(grid[y][x]===1){ctx.fillStyle='#2d2d2d';ctx.fillRect(x*CELL,y*CELL,CELL,CELL);}
    else{ctx.fillStyle='#111';ctx.fillRect(x*CELL,y*CELL,CELL,CELL);}
  }
  // exit
  const ex=N-1,ey=N-1;ctx.fillStyle='rgba(198,167,106,.25)';ctx.fillRect(ex*CELL,ey*CELL,CELL,CELL);
  ctx.font=Math.floor(CELL*.7)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🏁',(ex+.5)*CELL,(ey+.5)*CELL);
  ctx.fillText('🟡',(px+.5)*CELL,(py+.5)*CELL);
}
function move(dx,dy){
  const nx=px+dx,ny=py+dy;
  if(nx<0||nx>=N||ny<0||ny>=N||grid[ny][nx]===1)return;
  px=nx;py=ny;moves++;updateMoves();drawMaze();
  if(px===N-1&&py===N-1)winGame();
}
function updateMoves(){document.getElementById('movesDisp').textContent=moves}
function winGame(){
  clearInterval(timerInt);
  show('winScreen');
  document.getElementById('winSub').textContent=`${moves} moves · ${document.getElementById('timerDisp').textContent} elapsed`;
}
document.addEventListener('keydown',e=>{
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
  if(map[e.key]){e.preventDefault();move(...map[e.key]);}
});
</script>
</body></html>
