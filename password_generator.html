<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Password Generator — WebGames</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#090909;color:#f4f1eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:rgba(15,15,15,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:2rem;width:min(460px,100%);box-shadow:0 40px 100px rgba(0,0,0,0.6);display:flex;flex-direction:column;gap:1.25rem}
h1{font-size:1.8rem;font-weight:800;color:#c6a76a}
p.sub{color:#b5aea3;font-size:.9rem}
label{font-size:.8rem;color:#7f786f;text-transform:uppercase;letter-spacing:.1em}
input[type=range]{appearance:none;-webkit-appearance:none;width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:99px;outline:none;margin:.5rem 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#c6a76a;cursor:pointer}
.checkboxes{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.check-row{display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,0.04);border-radius:10px;padding:.65rem .9rem;cursor:pointer;border:1px solid rgba(255,255,255,0.08)}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#c6a76a;cursor:pointer}
.check-row span{font-size:.9rem}
.pass-display{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:1rem 1.25rem;font-family:'Courier New',monospace;font-size:1.1rem;word-break:break-all;min-height:3.5rem;line-height:1.8;letter-spacing:.05em;color:#f4f1eb}
.strength-bar{height:6px;border-radius:99px;transition:width .3s,background .3s;width:0%}
.strength-wrap{background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden}
.strength-label{font-size:.75rem;margin-top:.25rem;font-weight:600}
button{cursor:pointer;font-family:inherit;font-weight:700;border:none;border-radius:12px;padding:.875rem;font-size:.95rem;transition:transform .15s;width:100%}
button:hover{transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,#c6a76a,#e8c87a);color:#111}
.btn-ghost{background:rgba(255,255,255,0.06);color:#f4f1eb;border:1px solid rgba(255,255,255,0.12)}
.copy-msg{text-align:center;font-size:.85rem;color:#34c759;min-height:1.2rem;font-weight:600}
.back{display:block;text-align:center;color:#7f786f;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none}
.back:hover{color:#c6a76a}
</style></head><body>
<div class="card">
  <h1>🔐 Password Generator</h1>
  <p class="sub">Generate a strong, secure password in seconds.</p>

  <div>
    <div style="display:flex;justify-content:space-between;align-items:center"><label>Length</label><span id="lenVal" style="color:#c6a76a;font-weight:700">16</span></div>
    <input type="range" id="lengthSlider" min="8" max="64" value="16" oninput="onSlider()" style="margin-top:.5rem"/>
  </div>

  <div class="checkboxes">
    <label class="check-row"><input type="checkbox" id="ckUpper" checked onchange="generate()"/><span>Uppercase A-Z</span></label>
    <label class="check-row"><input type="checkbox" id="ckLower" checked onchange="generate()"/><span>Lowercase a-z</span></label>
    <label class="check-row"><input type="checkbox" id="ckNumbers" checked onchange="generate()"/><span>Numbers 0-9</span></label>
    <label class="check-row"><input type="checkbox" id="ckSymbols" checked onchange="generate()"/><span>Symbols !@#…</span></label>
  </div>

  <div>
    <div class="pass-display" id="passDisplay">Click Generate to create a password</div>
    <div class="strength-wrap" style="margin-top:.5rem"><div class="strength-bar" id="strengthBar"></div></div>
    <div class="strength-label" id="strengthLabel" style="color:#7f786f">Strength: —</div>
  </div>

  <button class="btn-gold" onclick="generate()">Generate Password</button>
  <button class="btn-ghost" onclick="copyPass()">Copy to Clipboard</button>
  <div class="copy-msg" id="copyMsg"></div>

  <a href="game_hub.html" class="back">← Back to Hub</a>
</div>
<script>
const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ',LOWER='abcdefghijklmnopqrstuvwxyz',NUMBERS='0123456789',SYMBOLS='!@#$%^&*()_+-=[]{}|;:,.<>?';
let currentPass='';
function onSlider(){document.getElementById('lenVal').textContent=document.getElementById('lengthSlider').value;generate()}
function generate(){
  let pool='';
  if(document.getElementById('ckUpper').checked)pool+=UPPER;
  if(document.getElementById('ckLower').checked)pool+=LOWER;
  if(document.getElementById('ckNumbers').checked)pool+=NUMBERS;
  if(document.getElementById('ckSymbols').checked)pool+=SYMBOLS;
  if(!pool){document.getElementById('passDisplay').textContent='Select at least one character type';return}
  const len=+document.getElementById('lengthSlider').value;
  const arr=new Uint32Array(len);crypto.getRandomValues(arr);
  currentPass=Array.from(arr).map(v=>pool[v%pool.length]).join('');
  document.getElementById('passDisplay').textContent=currentPass;
  document.getElementById('copyMsg').textContent='';
  updateStrength();
}
function updateStrength(){
  const p=currentPass,l=p.length;
  let s=0;
  if(l>=8)s++;if(l>=12)s++;if(l>=16)s++;if(l>=20)s++;
  if(/[A-Z]/.test(p))s++;if(/[a-z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;
  const pct=Math.min(100,s/8*100);
  const bar=document.getElementById('strengthBar');bar.style.width=pct+'%';
  const colors=['#ff453a','#ff9f0a','#c6a76a','#34c759'],labels=['Weak','Fair','Strong','Very Strong'];
  const idx=Math.floor(Math.min(pct-1,99)/25);bar.style.background=colors[idx];
  document.getElementById('strengthLabel').textContent='Strength: '+labels[idx];document.getElementById('strengthLabel').style.color=colors[idx];
}
function copyPass(){
  if(!currentPass)return;
  navigator.clipboard.writeText(currentPass).then(()=>{document.getElementById('copyMsg').textContent='✓ Copied to clipboard!';setTimeout(()=>document.getElementById('copyMsg').textContent='',2500)}).catch(()=>{document.getElementById('copyMsg').textContent='Could not copy — select and copy manually'});
}
generate();
</script>
</body></html>
