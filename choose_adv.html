<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Choose Adventure — WebGames</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:radial-gradient(circle at 12% 10%,rgba(198,167,106,.18),transparent 26%),radial-gradient(circle at 88% 0%,rgba(255,255,255,.08),transparent 20%),linear-gradient(180deg,#050505 0%,#0c0c0c 100%);background-attachment:fixed;color:#f4f1eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:rgba(15,15,15,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:2rem;width:min(540px,100%);box-shadow:0 40px 100px rgba(0,0,0,0.6);display:flex;flex-direction:column;gap:1.25rem}
h1{font-size:1.8rem;font-weight:800;color:#c6a76a}
p.sub{color:#b5aea3;font-size:.9rem}
input[type=text]{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:10px;padding:.75rem 1rem;color:#f4f1eb;font-size:1rem;font-family:inherit;outline:none}
input:focus{border-color:#c6a76a}
.story-text{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:1.25rem;line-height:1.8;white-space:pre-wrap;font-size:1rem}
.choices{display:flex;flex-direction:column;gap:.6rem}
button{cursor:pointer;font-family:inherit;font-weight:600;border:none;border-radius:12px;padding:.875rem 1.25rem;font-size:.95rem;transition:transform .15s,background .15s;text-align:left}
button:hover{transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,#c6a76a,#e8c87a);color:#111;font-weight:700;width:100%}
.btn-choice{background:rgba(255,255,255,0.06);color:#f4f1eb;border:1px solid rgba(255,255,255,0.12)}
.btn-choice:hover{background:rgba(255,255,255,0.1)}
.score-bar{display:flex;justify-content:space-between;font-size:.8rem;color:#7f786f}
.back{display:block;text-align:center;color:#7f786f;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none}
.back:hover{color:#c6a76a}
label{font-size:.8rem;color:#7f786f;text-transform:uppercase;letter-spacing:.1em}
</style></head><body>
<div class="card">
  <h1>🕹️ Choose Your Adventure</h1>
  <div id="nameScreen">
    <p class="sub">Enter your name to begin your quest.</p>
    <input type="text" id="nameInput" placeholder="Your name…" onkeydown="if(event.key==='Enter')beginAdventure()"/>
    <button class="btn-gold" style="margin-top:.75rem" onclick="beginAdventure()">Begin Adventure</button>
  </div>
  <div id="gameScreen" style="display:none;flex-direction:column;gap:1rem">
    <div class="score-bar"><span id="sceneLabel">Scene 1</span><span>Score: <strong id="scoreLabel">0</strong></span></div>
    <div class="story-text" id="storyText"></div>
    <div class="choices" id="choicesDiv"></div>
  </div>
  <a href="game_hub.html" class="back">← Back to Hub</a>
</div>
<script>
const STORY={
  road:{text:"You wake up in a mysterious forest. The air is foggy and sounds of wildlife echo around you.\nYou find three paths ahead.",opts:[{t:"Take the LEFT path (darker, mysterious)",next:"dark_forest",s:0},{t:"Take the CENTER path (well-trodden)",next:"village",s:5},{t:"Take the RIGHT path (narrow, overgrown)",next:"cliff",s:0}]},
  dark_forest:{text:"You venture into a dark forest. A wise old wizard appears!\nHe offers you a choice.",opts:[{t:"Ask for his magic amulet",next:"wizard_fight",s:-15},{t:"Ask for directions to treasure",next:"wizard_map",s:20},{t:"Ignore him and move on",next:"forest_lost",s:-5}]},
  wizard_fight:{text:"The wizard attacks you with dark magic! You are overwhelmed.\n\n💀 Game Over — Defeated by the wizard.",opts:[{t:"Play Again",next:"_restart",s:0}]},
  wizard_map:{text:"The wizard smiles and gives you an ancient treasure map!\nHe points north.",opts:[{t:"Follow the map north",next:"mountain",s:10},{t:"Show the map to others first",next:"village",s:5}]},
  forest_lost:{text:"You wander deeper into the forest and become hopelessly lost.\n\n💀 Game Over — Lost in the wilderness.",opts:[{t:"Play Again",next:"_restart",s:0}]},
  cliff:{text:"The narrow path leads to a steep cliff with a breathtaking view.\nYou spot a rope bridge and a cave below.",opts:[{t:"Cross the rope bridge",next:"mountain",s:10},{t:"Explore the cave",next:"cave",s:15},{t:"Turn back to the forest",next:"road",s:0}]},
  cave:{text:"Inside the cave you find ancient drawings and a chest of gold coins!\n\n🏆 You found treasure! Adventure complete.",opts:[{t:"Play Again",next:"_restart",s:0}]},
  village:{text:"You reach a peaceful village! The locals welcome you warmly.\nAn innkeeper offers three options.",opts:[{t:"Rest and gather information",next:"tavern",s:5},{t:"Challenge the local champion",next:"duel",s:10},{t:"Steal from the village treasury",next:"caught",s:-20}]},
  tavern:{text:"At the tavern you meet a merchant who tells you of a dragon's lair to the east.\nHe offers to guide you for a fee.",opts:[{t:"Hire the merchant guide",next:"dragon",s:15},{t:"Go east alone",next:"dragon_alone",s:5}]},
  duel:{text:"You win the duel! The champion respects your skill and joins your quest.\n\n🏆 Gained an ally! Adventure complete.",opts:[{t:"Play Again",next:"_restart",s:0}]},
  caught:{text:"You are caught by the village guards and thrown in the dungeon for a week.\n\n💀 Game Over — Dishonor ends your quest.",opts:[{t:"Play Again",next:"_restart",s:0}]},
  mountain:{text:"You reach a snow-capped mountain. Two routes present themselves.",opts:[{t:"Climb to the summit",next:"summit",s:20},{t:"Take the valley pass",next:"valley",s:10}]},
  summit:{text:"At the summit you find an ancient shrine. A spirit rewards your courage with wisdom.\n\n🏆 Victory — You reached the summit!",opts:[{t:"Play Again",next:"_restart",s:0}]},
  valley:{text:"The valley pass leads to a bustling city where your adventure becomes legend.\n\n🏆 Victory — A hero's welcome!",opts:[{t:"Play Again",next:"_restart",s:0}]},
  dragon:{text:"With the merchant's help you outsmart the dragon and claim its hoard.\n\n🏆 Dragon defeated! You're a legend.",opts:[{t:"Play Again",next:"_restart",s:0}]},
  dragon_alone:{text:"You charge in alone and barely escape with a scorched cloak but a funny story.\n\n😅 Lived to fight another day!",opts:[{t:"Play Again",next:"_restart",s:0}]}
};
let playerName='',score=0,scene=0;
function beginAdventure(){
  playerName=document.getElementById('nameInput').value.trim()||'Adventurer';
  document.getElementById('nameScreen').style.display='none';
  document.getElementById('gameScreen').style.display='flex';
  score=0;scene=0;goTo('road');
}
function goTo(key){
  if(key==='_restart'){document.getElementById('gameScreen').style.display='none';document.getElementById('nameScreen').style.display='block';return}
  scene++;
  document.getElementById('sceneLabel').textContent=`Scene ${scene}`;
  document.getElementById('scoreLabel').textContent=score;
  const s=STORY[key];
  document.getElementById('storyText').textContent=s.text.replace('You',playerName);
  const cd=document.getElementById('choicesDiv');cd.innerHTML='';
  s.opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='btn-choice';btn.textContent=o.t;
    btn.onclick=()=>{score+=o.s;goTo(o.next)};
    cd.appendChild(btn);
  });
}
</script>
</body></html>
