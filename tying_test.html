<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Typing Test — WebGames</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#090909;color:#f4f1eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:rgba(15,15,15,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:2rem;width:min(620px,100%);box-shadow:0 40px 100px rgba(0,0,0,0.6);display:flex;flex-direction:column;gap:1rem}
h1{font-size:1.8rem;font-weight:800;color:#c6a76a}
p.sub{color:#b5aea3;font-size:.9rem}
.screen{display:none;flex-direction:column;gap:1rem}
.screen.active{display:flex}
select{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:10px;padding:.75rem 1rem;color:#f4f1eb;font-size:1rem;font-family:inherit;outline:none}
select:focus{border-color:#c6a76a}
select option{background:#111}
.passage-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:1.25rem;font-size:1.1rem;line-height:1.8;letter-spacing:.02em;font-family:'Courier New',monospace}
.passage-box .correct{color:#34c759}.passage-box .wrong{color:#ff453a;background:rgba(255,69,58,.15);border-radius:3px}.passage-box .cursor{border-right:2px solid #c6a76a;animation:blink .8s infinite}
@keyframes blink{50%{opacity:0}}
textarea{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:12px;padding:1rem;color:#f4f1eb;font-size:1rem;font-family:'Courier New',monospace;outline:none;resize:none;height:100px;line-height:1.6}
textarea:focus{border-color:#c6a76a}
button{cursor:pointer;font-family:inherit;font-weight:700;border:none;border-radius:12px;padding:.875rem;font-size:.95rem;transition:transform .15s;width:100%}
button:hover:not(:disabled){transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,#c6a76a,#e8c87a);color:#111}
.btn-ghost{background:rgba(255,255,255,0.06);color:#f4f1eb;border:1px solid rgba(255,255,255,0.12)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem}
.stat{background:rgba(255,255,255,0.04);border-radius:10px;padding:.6rem;text-align:center}
.stat strong{display:block;font-size:1rem;color:#c6a76a}
.stat span{font-size:.65rem;color:#7f786f;text-transform:uppercase;letter-spacing:.1em}
.timer-bar-wrap{background:rgba(255,255,255,0.08);border-radius:99px;height:5px;overflow:hidden}
.timer-bar{height:100%;background:linear-gradient(90deg,#c6a76a,#e8c87a);border-radius:99px;transition:width .5s linear}
.back{display:block;text-align:center;color:#7f786f;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none}
.back:hover{color:#c6a76a}
label{font-size:.8rem;color:#7f786f;text-transform:uppercase;letter-spacing:.1em}
</style></head><body>
<div class="card">
  <h1>⌨️ Typing Test</h1>
  <p class="sub">Type the passage as fast and accurately as you can.</p>
  <div class="screen active" id="setupScreen">
    <div><label>Difficulty</label>
      <select id="diff" style="margin-top:.4rem">
        <option value="Easy">Easy</option>
        <option value="Medium" selected>Medium</option>
        <option value="Hard">Hard</option>
      </select>
    </div>
    <button class="btn-gold" onclick="startTest()">Start Test</button>
  </div>
  <div class="screen" id="testScreen">
    <div style="display:flex;justify-content:space-between;font-size:.85rem;color:#7f786f">
      <span id="timerLabel">60s</span><span id="progressLabel">0%</span>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
    <div class="passage-box" id="passageDisplay"></div>
    <textarea id="typingInput" placeholder="Start typing here…" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    <div class="stats">
      <div class="stat"><strong id="wpmDisp">0</strong><span>WPM</span></div>
      <div class="stat"><strong id="accDisp">100%</strong><span>Accuracy</span></div>
      <div class="stat"><strong id="charDisp">0</strong><span>Chars</span></div>
      <div class="stat"><strong id="errDisp">0</strong><span>Errors</span></div>
    </div>
    <button class="btn-ghost" onclick="startTest()">Restart</button>
  </div>
  <div class="screen" id="resultsScreen">
    <div style="text-align:center;font-size:3rem" id="resultEmoji">⌨️</div>
    <div style="text-align:center"><strong id="resultTitle" style="font-size:1.3rem"></strong><br/><span style="color:#b5aea3" id="resultSub"></span></div>
    <div class="stats">
      <div class="stat"><strong id="rWpm">0</strong><span>WPM</span></div>
      <div class="stat"><strong id="rAcc">0%</strong><span>Accuracy</span></div>
      <div class="stat"><strong id="rChars">0</strong><span>Chars</span></div>
      <div class="stat"><strong id="rErrors">0</strong><span>Errors</span></div>
    </div>
    <button class="btn-gold" onclick="startTest()">Try Again</button>
    <button class="btn-ghost" onclick="show('setupScreen')">Change Difficulty</button>
  </div>
  <a href="game_hub.html" class="back">← Back to Hub</a>
</div>
<script>
const PASSAGES={
  Easy:["Typing every day builds speed and confidence over time.","Small habits repeated daily can create excellent results.","Practice with focus and your fingers will learn the rhythm."],
  Medium:["A calm mind and steady breathing can improve typing precision under pressure.","Great typists avoid looking at the keyboard and trust muscle memory to guide them.","Accuracy before speed is the rule that creates lasting typing improvement."],
  Hard:["Precision compounds when your error rate drops your average words per minute rises naturally and stays stable.","Technical writing requires punctuation discipline controlled pacing and deliberate corrections during long sessions.","Elite performance is built through focused repetition objective measurement and honest post session analysis."]
};
let target='',startTime=null,timer=null,finished=false;
function show(id){['setupScreen','testScreen','resultsScreen'].forEach(s=>document.getElementById(s).classList.remove('active'));document.getElementById(id).classList.add('active')}
function startTest(){
  const diff=document.getElementById('diff').value;
  const pool=PASSAGES[diff];
  target=pool[Math.floor(Math.random()*pool.length)];
  finished=false;startTime=null;
  clearInterval(timer);
  renderPassage('');
  document.getElementById('typingInput').value='';
  document.getElementById('typingInput').disabled=false;
  document.getElementById('wpmDisp').textContent='0';
  document.getElementById('accDisp').textContent='100%';
  document.getElementById('charDisp').textContent='0';
  document.getElementById('errDisp').textContent='0';
  document.getElementById('timerBar').style.width='100%';
  document.getElementById('timerBar').style.background='linear-gradient(90deg,#c6a76a,#e8c87a)';
  let secs=60;
  document.getElementById('timerLabel').textContent='60s';
  timer=setInterval(()=>{
    if(!startTime)return;
    secs--;
    document.getElementById('timerLabel').textContent=secs+'s';
    document.getElementById('timerBar').style.width=(secs/60*100)+'%';
    if(secs<=10)document.getElementById('timerBar').style.background='#ff453a';
    if(secs<=0){clearInterval(timer);endTest();}
  },1000);
  show('testScreen');
  document.getElementById('typingInput').focus();
}
function renderPassage(typed){
  const chars=target.split('');
  let html='';
  chars.forEach((c,i)=>{
    if(i<typed.length){html+=typed[i]===c?`<span class="correct">${c}</span>`:`<span class="wrong">${c}</span>`;}
    else if(i===typed.length){html+=`<span class="cursor">${c}</span>`;}
    else{html+=c;}
  });
  document.getElementById('passageDisplay').innerHTML=html;
}
document.getElementById('typingInput').addEventListener('input',function(){
  if(finished)return;
  if(!startTime)startTime=Date.now();
  const typed=this.value;
  renderPassage(typed);
  const errors=typed.split('').filter((c,i)=>c!==target[i]).length;
  const wpm=Math.round((typed.length/5)/((Date.now()-startTime)/60000));
  const acc=typed.length>0?Math.round(((typed.length-errors)/typed.length)*100):100;
  document.getElementById('wpmDisp').textContent=wpm;
  document.getElementById('accDisp').textContent=acc+'%';
  document.getElementById('charDisp').textContent=typed.length;
  document.getElementById('errDisp').textContent=errors;
  document.getElementById('progressLabel').textContent=Math.round(typed.length/target.length*100)+'%';
  if(typed===target){clearInterval(timer);endTest();}
});
function endTest(){
  if(finished)return;finished=true;
  document.getElementById('typingInput').disabled=true;
  const typed=document.getElementById('typingInput').value;
  const elapsed=(Date.now()-startTime)/60000||1;
  const wpm=Math.round((typed.length/5)/elapsed);
  const errors=typed.split('').filter((c,i)=>c!==target[i]).length;
  const acc=typed.length>0?Math.round(((typed.length-errors)/typed.length)*100):0;
  document.getElementById('rWpm').textContent=wpm;
  document.getElementById('rAcc').textContent=acc+'%';
  document.getElementById('rChars').textContent=typed.length;
  document.getElementById('rErrors').textContent=errors;
  document.getElementById('resultEmoji').textContent=wpm>=60?'🏆':wpm>=40?'⭐':'💪';
  document.getElementById('resultTitle').textContent=wpm>=60?'Blazing Fast!':wpm>=40?'Great Speed!':'Keep Practicing!';
  document.getElementById('resultSub').textContent=`${wpm} WPM · ${acc}% accuracy`;
  show('resultsScreen');
}
</script>
</body></html>
