<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Math Blitz — WebGames</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#090909;color:#f4f1eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:rgba(15,15,15,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:2rem;width:min(480px,100%);box-shadow:0 40px 100px rgba(0,0,0,0.6);display:flex;flex-direction:column;gap:1rem}
h1{font-size:1.8rem;font-weight:800;color:#c6a76a}
p.sub{color:#b5aea3;font-size:.9rem}
.screen{display:none;flex-direction:column;gap:1rem}
.screen.active{display:flex}
select,input[type=number],input[type=text]{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:10px;padding:.75rem 1rem;color:#f4f1eb;font-size:1rem;font-family:inherit;outline:none}
select option{background:#111;color:#f4f1eb}
input:focus,select:focus{border-color:#c6a76a}
button{cursor:pointer;font-family:inherit;font-weight:700;border:none;border-radius:12px;padding:.875rem;font-size:.95rem;transition:transform .15s;width:100%}
button:hover:not(:disabled){transform:translateY(-1px)}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,#c6a76a,#e8c87a);color:#111}
.btn-ghost{background:rgba(255,255,255,0.06);color:#f4f1eb;border:1px solid rgba(255,255,255,0.12)}
.expr{font-size:2.5rem;font-weight:800;text-align:center;letter-spacing:-.02em;min-height:3.5rem}
.timer-bar-wrap{background:rgba(255,255,255,0.08);border-radius:99px;height:6px;overflow:hidden}
.timer-bar{height:100%;background:linear-gradient(90deg,#c6a76a,#e8c87a);border-radius:99px;transition:width .1s linear}
.feedback{text-align:center;font-size:1rem;font-weight:700;min-height:1.4rem}
.feedback.ok{color:#34c759}.feedback.bad{color:#ff453a}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}
.stat{background:rgba(255,255,255,0.04);border-radius:10px;padding:.6rem;text-align:center}
.stat strong{display:block;font-size:1rem;color:#c6a76a}
.stat span{font-size:.65rem;color:#7f786f;text-transform:uppercase;letter-spacing:.1em}
.back{display:block;text-align:center;color:#7f786f;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none}
.back:hover{color:#c6a76a}
label{font-size:.8rem;color:#7f786f;text-transform:uppercase;letter-spacing:.1em}
</style></head><body>
<div class="card">
  <h1>⚡ Math Blitz</h1>
  <p class="sub" id="subtitle">Race against time — solve as many as you can!</p>
  <div class="screen active" id="setupScreen">
    <div><label>Difficulty</label>
      <select id="diff" style="margin-top:.4rem">
        <option value="easy">Easy — addition & subtraction (1–9)</option>
        <option value="medium" selected>Medium — includes multiplication (1–12)</option>
        <option value="hard">Hard — all ops including division (1–20)</option>
      </select>
    </div>
    <div><label>Number of Problems</label>
      <input type="number" id="numProbs" value="10" min="5" max="50" style="margin-top:.4rem"/>
    </div>
    <button class="btn-gold" onclick="startGame()">Start!</button>
  </div>
  <div class="screen" id="gameScreen">
    <div style="display:flex;justify-content:space-between;font-size:.8rem;color:#7f786f">
      <span id="probCounter">1 / 10</span><span id="timerDisplay">10s</span>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
    <div class="expr" id="exprDisplay"></div>
    <input type="number" id="answerInput" placeholder="Answer…" onkeydown="if(event.key==='Enter')checkAnswer()" autofocus/>
    <button class="btn-gold" onclick="checkAnswer()">Submit</button>
    <div class="feedback" id="feedback"></div>
    <div class="stats">
      <div class="stat"><strong id="scoreDisp">0</strong><span>Score</span></div>
      <div class="stat"><strong id="rightDisp">0</strong><span>Correct</span></div>
      <div class="stat"><strong id="wrongDisp">0</strong><span>Wrong</span></div>
    </div>
  </div>
  <div class="screen" id="resultsScreen">
    <div class="expr" id="resultEmoji">🎉</div>
    <div style="text-align:center">
      <div style="font-size:1.2rem;font-weight:700" id="resultTitle"></div>
      <div style="color:#b5aea3;margin-top:.25rem" id="resultSub"></div>
    </div>
    <div class="stats">
      <div class="stat"><strong id="rScore">0</strong><span>Score</span></div>
      <div class="stat"><strong id="rRight">0</strong><span>Correct</span></div>
      <div class="stat"><strong id="rTime">0s</strong><span>Time</span></div>
    </div>
    <button class="btn-gold" onclick="goSetup()">Play Again</button>
    <button class="btn-ghost" onclick="goSetup()">Change Difficulty</button>
  </div>
  <a href="game_hub.html" class="back">← Back to Hub</a>
</div>
<script>
const DIFFS={easy:{min:2,max:9,ops:['+','-']},medium:{min:3,max:12,ops:['+','-','*']},hard:{min:5,max:20,ops:['+','-','*','/']}};
const TIME_PER=10;
let problems,total,cur,score,right,wrong,timer,startTime;
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function genProblem(){
  const d=DIFFS[document.getElementById('diff').value];
  const op=d.ops[Math.floor(Math.random()*d.ops.length)];
  let a=rand(d.min,d.max),b=rand(d.min,d.max),ans;
  if(op==='/'){ b=rand(1,d.max); a=b*rand(1,d.max); ans=a/b; }
  else if(op==='-'){ if(a<b){let t=a;a=b;b=t;} ans=a-b; }
  else if(op==='*'){ ans=a*b; }
  else{ ans=a+b; }
  return{expr:`${a} ${op} ${b} = ?`,ans};
}
function show(id){['setupScreen','gameScreen','resultsScreen'].forEach(s=>{document.getElementById(s).classList.remove('active')});document.getElementById(id).classList.add('active')}
function startGame(){
  total=parseInt(document.getElementById('numProbs').value)||10;
  cur=0;score=0;right=0;wrong=0;problems=[];
  for(let i=0;i<total;i++)problems.push(genProblem());
  show('gameScreen');startTime=Date.now();
  loadQuestion();
}
function loadQuestion(){
  if(cur>=total){endGame();return}
  const p=problems[cur];
  document.getElementById('exprDisplay').textContent=p.expr;
  document.getElementById('answerInput').value='';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('probCounter').textContent=`${cur+1} / ${total}`;
  document.getElementById('answerInput').focus();
  clearInterval(timer);
  let t=TIME_PER;
  document.getElementById('timerBar').style.width='100%';
  document.getElementById('timerBar').style.background='linear-gradient(90deg,#c6a76a,#e8c87a)';
  timer=setInterval(()=>{
    t-=0.1;
    document.getElementById('timerBar').style.width=(t/TIME_PER*100)+'%';
    document.getElementById('timerDisplay').textContent=t.toFixed(1)+'s';
    if(t<=3)document.getElementById('timerBar').style.background='#ff453a';
    if(t<=0){clearInterval(timer);wrong++;updateStats();document.getElementById('feedback').textContent='⏱ Time up!';document.getElementById('feedback').className='feedback bad';setTimeout(()=>{cur++;loadQuestion()},800);}
  },100);
}
function checkAnswer(){
  const v=parseFloat(document.getElementById('answerInput').value);
  if(isNaN(v))return;
  clearInterval(timer);
  const p=problems[cur];
  if(v===p.ans){right++;score+=10;document.getElementById('feedback').textContent='✓ Correct! +10';document.getElementById('feedback').className='feedback ok';}
  else{wrong++;document.getElementById('feedback').textContent=`✗ Answer was ${p.ans}`;document.getElementById('feedback').className='feedback bad';}
  updateStats();
  cur++;setTimeout(loadQuestion,700);
}
function updateStats(){document.getElementById('scoreDisp').textContent=score;document.getElementById('rightDisp').textContent=right;document.getElementById('wrongDisp').textContent=wrong}
function endGame(){
  clearInterval(timer);
  const elapsed=((Date.now()-startTime)/1000).toFixed(1);
  show('resultsScreen');
  document.getElementById('rScore').textContent=score;
  document.getElementById('rRight').textContent=`${right}/${total}`;
  document.getElementById('rTime').textContent=elapsed+'s';
  const pct=right/total;
  document.getElementById('resultEmoji').textContent=pct===1?'🏆':pct>=.7?'⭐':'💪';
  document.getElementById('resultTitle').textContent=pct===1?'Perfect Score!':pct>=.7?'Great job!':'Keep practicing!';
  document.getElementById('resultSub').textContent=`${right} correct out of ${total} in ${elapsed}s`;
}
function goSetup(){show('setupScreen')}
</script>
</body></html>
